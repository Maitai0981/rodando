spring.config.import=optional:file:.env.local[.properties],optional:file:.env.${APP_ENV:noop}.local[.properties]
spring.application.name=backend
server.port=${PORT:4000}
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=${FLYWAY_BASELINE_VERSION:0}
spring.flyway.clean-disabled=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_BYTES:6291456}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_BYTES:6291456}
management.endpoints.web.exposure.include=health,info
server.error.include-message=never
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS:true}
spring.mail.test-connection=false
