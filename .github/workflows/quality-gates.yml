name: quality-gates

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/rodando_test
      DB_RESET: 1
      OWNER_SEED_EMAIL: owner_test@rodando.local
      OWNER_SEED_PASSWORD: 123456
      OWNER_SEED_NAME: Owner Test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test

  frontend-quality:
    name: Frontend lint/build/unit/a11y
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:a11y

  frontend-e2e:
    name: Frontend e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Verify frontend lockfile
        working-directory: frontend
        run: npm ci --ignore-scripts
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Backend audit (high)
        working-directory: backend
        run: npm audit --audit-level=high
      - name: Frontend audit (high)
        working-directory: frontend
        run: npm audit --audit-level=high

  performance-report:
    name: Performance report
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/rodando_perf
      DB_RESET: 1
      SEED_BASE_CATALOG: 1
      SEED_DEMO_DATA: 1
      OWNER_SEED_EMAIL: owner_test@rodando.local
      OWNER_SEED_PASSWORD: 123456
      OWNER_SEED_NAME: Owner Test
      API_BASE: http://127.0.0.1:4000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Verify frontend lockfile
        working-directory: frontend
        run: npm ci --ignore-scripts
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Collect backend API perf
        working-directory: backend
        run: |
          npm run start > perf-backend.out.log 2> perf-backend.err.log &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4000/api/health >/dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:4000/api/health >/dev/null; then
            echo "Backend did not become healthy in time"
            cat perf-backend.err.log || true
            exit 1
          fi
          npm run perf:api
      - name: Collect frontend build perf
        working-directory: frontend
        run: |
          npm run perf:build
          npm run perf:bundle
      - name: Build consolidated perf report
        run: node scripts/perf-report.mjs
      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-artifacts
          path: |
            backend/perf
            backend/perf-backend.out.log
            backend/perf-backend.err.log
            frontend/perf
            docs/performance-pass-report.md
          if-no-files-found: ignore

  quality-summary:
    name: Quality summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality, frontend-e2e, security-audit, performance-report]
    if: always()
    steps:
      - name: Final gate
        run: |
          echo "backend-tests=${{ needs.backend-tests.result }}"
          echo "frontend-quality=${{ needs.frontend-quality.result }}"
          echo "frontend-e2e=${{ needs.frontend-e2e.result }}"
          echo "security-audit=${{ needs.security-audit.result }}"
          echo "performance-report=${{ needs.performance-report.result }}"
          test "${{ needs.backend-tests.result }}" = "success"
          test "${{ needs.frontend-quality.result }}" = "success"
          test "${{ needs.frontend-e2e.result }}" = "success"
          test "${{ needs.security-audit.result }}" = "success"
          test "${{ needs.performance-report.result }}" = "success"

